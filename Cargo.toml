[package]
name = "gartus"
version = "0.1.0"
authors = ["Seniormars <cjh16@rice.edu>"]
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[profile.dev]
opt-level = 0
debug = true

[profile.release]
debug = 1
incremental = true
lto = "off"

[dependencies]
num = "0.3.1"

[dev-dependencies]
rand = "0.8.5"
num = "0.3.1"

[features]
default = ["external", "old_parser", "turtle", "filters", "fancy_math"]
external = ["filters"]
filters = []
old_parser = []
turtle = []
fancy_math = []

[[example]]
name = "frac_tree"
required-features = ["turtle"]

[[example]]
name = "maze"
required-features = ["turtle"]

[[example]]
name = "mesh_teapot"
required-features = ["external"]

[[test]]
name = "script"
required-features = ["old_parser"]

[[test]]
name = "dw_tests"
required-features = ["old_parser"]

# [[bench]]
# name = "derp"
# harness = false
